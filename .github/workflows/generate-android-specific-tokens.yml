name: Generate Android Specific Tokens

on:
  pull_request:
    paths:
      - 'token-source/android_specific_tokens.json'
  workflow_dispatch:

jobs:
  generate-tokens:
    runs-on: ubuntu-latest
    # Avoid re-triggering when the bot itself pushes changes
    # Manual trigger is restricted to the main branch
    # Fork PRs are excluded as they don't have access to repository secrets
    if: |
      github.actor != 'github-actions[bot]' &&
      (github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main') &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR branch
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout branch (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      # Context: https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#signing-commits-in-a-workflow
      # Link: https://github.com/crazy-max/ghaction-import-gpg/releases
      - name: Import bot's GPG key for signing commits
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec # v6.3.0
        with:
          gpg_private_key: ${{ secrets.BOT_MOBILE_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_MOBILE_GPG_PASSPHRASE }}
          git_config_global: true
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Configure git user
        run: |
          git config --global user.name "dev-mobile-bot"
          git config --global user.email "mobile+github-bot@infomaniak-dev.ch"

      # fwilhe2/setup-kotlin@v1.8
      - name: Set up Kotlin
        uses: fwilhe2/setup-kotlin@7163c92e0f906bdf586bd76b14143aa61d6b49e4
        with:
          version: 2.3.10

      - name: Run generateAndroidSpecificTokens script
        run: kotlin scripts/generateAndroidSpecificTokens.main.kts

      - name: Commit and push to PR branch
        if: github.event_name == 'pull_request'
        run: |
          git add --all
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: Regenerate tokens from android_specific_tokens.json"
            git push
          fi

      - name: Close existing regeneration PRs and prune branches (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          gh pr list --base main --state open --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("bot/regenerate-android-specific-tokens-")) | [.number, .headRefName] | @tsv' \
            | while IFS=$'\t' read -r PR_NUMBER BRANCH; do
                gh pr close "$PR_NUMBER" --comment "Superseded by a new workflow_dispatch run."
              done
          git ls-remote --heads origin 'refs/heads/bot/regenerate-android-specific-tokens-*' \
            | awk '{ sub("refs/heads/","",$2); print $2 }' \
            | while IFS= read -r branch; do git push origin --delete "$branch" || true; done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create new branch and open PR (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git add --all
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            BRANCH="bot/regenerate-android-specific-tokens-$(date +%Y%m%d%H%M%S)"
            git checkout -b "$BRANCH"
            git commit -m "chore: Regenerate tokens from android_specific_tokens.json"
            git push origin "$BRANCH"
            gh pr create \
              --title "chore: Regenerate tokens from android_specific_tokens.json" \
              --body "Automated PR generated by the **Generate Android Specific Tokens** workflow (manual trigger)." \
              --head "$BRANCH" \
              --base "${{ github.ref_name }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
