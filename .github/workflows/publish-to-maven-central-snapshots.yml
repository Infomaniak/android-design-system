# https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions
name: Publish to Maven Central Snapshots
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Snapshot version to publish (e.g. 0.1.0)'
        required: true
        type: string
      perform-a-gradle-clean:
        description: "Perform a Gradle clean"
        type: boolean
        default: false
      notify-kchat:
        description: "Send a KChat notification once published"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Normalize version (append -SNAPSHOT if missing)
        run: |
          VERSION="${{ inputs.version }}"
          if [[ "$VERSION" != *-SNAPSHOT ]]; then
            VERSION="$VERSION-SNAPSHOT"
          fi
          echo "SNAPSHOT_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Perform a Gradle clean, as requested
        if: ${{ github.event.inputs.perform-a-gradle-clean == 'true' }}
        run: ./gradlew clean

      - name: Publish the snapshots
        run: ./gradlew publishAggregationToCentralSnapshots -Pdesignsystem.version=${{ env.SNAPSHOT_VERSION }}

      - name: List published libraries
        id: modules
        run: |
          {
            echo 'list<<EOF'
            ./gradlew -q listPublishedModules -Pdesignsystem.version=${{ env.SNAPSHOT_VERSION }}
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Notify KChat
        if: ${{ inputs.notify-kchat && env.KCHAT_DESIGN_SYSTEM_WEBHOOK_URL != '' }}
        env:
          KCHAT_DESIGN_SYSTEM_WEBHOOK_URL: ${{ secrets.KCHAT_DESIGN_SYSTEM_WEBHOOK_URL }}
        run: |
          LIBS=$(echo "${{ steps.modules.outputs.list }}" | sed -E 's#^(.*)$#implementation("\1")#')
          TEXT=$(printf ':android: *Android Design System snapshot %s* is available on Maven Central Snapshots!\n:package: Available libraries:\n```\n%s\n```\n:link: https://central.sonatype.com/service/rest/repository/browse/maven-snapshots/com/infomaniak/designsystem/' \
            "${{ env.SNAPSHOT_VERSION }}" "$LIBS")
          curl -s -X POST "$KCHAT_DESIGN_SYSTEM_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg text "$TEXT" '{text: $text}')"
env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx5g -Dfile.encoding=UTF-8"
  ossrhUsername: ${{ secrets.SONATYPE_USERNAME }}
  ossrhPassword: ${{ secrets.SONATYPE_PASSWORD }}
  GPG_key_id: ${{ secrets.GPG_KEY_ID }}
  GPG_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
  GPG_private_password: ${{ secrets.GPG_PRIVATE_PASSWORD }}
  KCHAT_DESIGN_SYSTEM_WEBHOOK_URL: ${{ secrets.KCHAT_DESIGN_SYSTEM_WEBHOOK_URL }}
