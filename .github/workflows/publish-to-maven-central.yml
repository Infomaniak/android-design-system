# https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions
name: Publish to Maven Central
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (x.x.x). Leave empty to auto-bump from the latest release using "bump"'
        required: false
        type: string
      bump:
        description: 'Version part to bump automatically when "version" is left empty'
        required: true
        default: patch
        type: choice
        options:
          - major
          - minor
          - patch
      acknowledgement:
        description: |
          WARNING: Publishing a version to Maven Central is irrevocable.
          Do you confirm (Yes/no):
          1. You have successfully tested publishing a snapshot (with a Gradle CLEAN) just before changing the version
          2. The version is CORRECT, and is NOT a SNAPSHOT
          3. You are running this workflow from the branch/ref you want to tag and release (a tag will be
             created automatically from it)
          4. You are not drunk or otherwise too tired
        required: true
        type: string
      notify-kchat:
        description: "Send a KChat notification once published"
        type: boolean
        default: true

permissions:
  contents: write
jobs:
  validate:
    name: Resolve version
    uses: Infomaniak/.github/.github/workflows/resolve-next-library-version.yml@v2
    with:
      version: ${{ inputs.version }}
      bump: ${{ inputs.bump }}

  build:
    name: Build and publish
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check acknowledgement
        run: test "${{ github.event.inputs.acknowledgement }}" = "Yes" || (echo "Acknowledgement missing" && exit 1)

      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Create and push tag
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          git config user.name "dev-mobile-bot"
          git config user.email "mobile+github-bot@infomaniak-dev.ch"
          git tag "$VERSION"
          git push origin "refs/tags/$VERSION"

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Perform a Gradle clean
        run: ./gradlew clean

      - name: Publish the artifacts
        id: publish
        run: ./gradlew publishAggregationToCentralPortal -Pdesignsystem.version=${{ needs.validate.outputs.version }}

      - name: Create GitHub Release
        run: |
          gh release create "${{ needs.validate.outputs.version }}" \
            --title "${{ needs.validate.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List published libraries
        id: modules
        run: |
          {
            echo 'list<<EOF'
            ./gradlew -q listPublishedModules -Pdesignsystem.version=${{ needs.validate.outputs.version }}
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Build commit tree link
        id: commit-link
        if: ${{ inputs.notify-kchat && env.KCHAT_DESIGN_SYSTEM_WEBHOOK_URL != '' }}
        uses: Infomaniak/.github/actions/commit-tree-link@v2

      - name: Notify KChat
        if: ${{ inputs.notify-kchat && env.KCHAT_DESIGN_SYSTEM_WEBHOOK_URL != '' }}
        env:
          KCHAT_DESIGN_SYSTEM_WEBHOOK_URL: ${{ secrets.KCHAT_DESIGN_SYSTEM_WEBHOOK_URL }}
        run: |
          LIBS=$(echo "${{ steps.modules.outputs.list }}" | sed -E 's#^(.*)$#implementation("\1")#')
          COMMIT_LINK="${{ steps.commit-link.outputs.markdown-link }}"
          TEXT=$(printf ':rocket: *Android Design System %s* is now available on Maven Central!\n:package: Available libraries:\n```\n%s\n```\n:link: https://central.sonatype.com/namespace/com.infomaniak.designsystem\n:pencil: Commit: %s' \
            "${{ needs.validate.outputs.version }}" "$LIBS" "$COMMIT_LINK")
          curl -s -X POST "$KCHAT_DESIGN_SYSTEM_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg text "$TEXT" '{text: $text}')"

      # Runs only if a previous step failed (Gradle Kotlin DSL "if:" without a status function
      # implies success(), so this needs to explicitly opt in with failure()). This removes the
      # tag we just pushed so a failed publish doesn't leave a dangling/incorrect version tag.
      - name: Delete tag on failure
        if: failure()
        run: git push origin --delete "refs/tags/${{ needs.validate.outputs.version }}" || true

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx5g -Dfile.encoding=UTF-8"
  ossrhUsername: ${{ secrets.SONATYPE_USERNAME }}
  ossrhPassword: ${{ secrets.SONATYPE_PASSWORD }}
  GPG_key_id: ${{ secrets.GPG_KEY_ID }}
  GPG_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
  GPG_private_password: ${{ secrets.GPG_PRIVATE_PASSWORD }}
  KCHAT_DESIGN_SYSTEM_WEBHOOK_URL: ${{ secrets.KCHAT_DESIGN_SYSTEM_WEBHOOK_URL }}
