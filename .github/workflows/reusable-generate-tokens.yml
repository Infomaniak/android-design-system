name: Reusable - Generate Tokens

on:
  workflow_call:
    inputs:
      script_path:
        description: 'Path to the .main.kts script to run (relative to repo root).'
        required: true
        type: string
      commit_message:
        description: 'Commit message used both for direct pushes and manual-trigger PRs.'
        required: true
        type: string
      branch_prefix:
        description: 'Prefix used for the branch created on manual trigger (e.g. bot/regenerate-app-themes-).'
        required: true
        type: string
      pr_title:
        description: 'Title used for the PR created on manual trigger.'
        required: true
        type: string
      workflow_name:
        description: 'Display name of the calling workflow, used in the PR body.'
        required: true
        type: string
      trigger_event_name:
        description: >-
          The caller's github.event_name (e.g. pull_request, workflow_dispatch). Reusable workflows
          always see github.event_name as "workflow_call", so the caller must forward its own value.
        required: true
        type: string
      head_ref:
        description: >-
          The caller's github.head_ref, used to check out the right branch on pull_request runs.
        required: false
        type: string
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR branch
        if: inputs.trigger_event_name == 'pull_request'
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ inputs.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout branch (manual trigger)
        if: inputs.trigger_event_name == 'workflow_dispatch'
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      # Context: https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#signing-commits-in-a-workflow
      # Link: https://github.com/crazy-max/ghaction-import-gpg/releases
      - name: Import bot's GPG key for signing commits
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec # v6.3.0
        with:
          gpg_private_key: ${{ secrets.BOT_MOBILE_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_MOBILE_GPG_PASSPHRASE }}
          git_config_global: true
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Configure git user
        run: |
          git config --global user.name "dev-mobile-bot"
          git config --global user.email "mobile+github-bot@infomaniak-dev.ch"

      # fwilhe2/setup-kotlin@v1.8
      - name: Set up Kotlin
        uses: fwilhe2/setup-kotlin@7163c92e0f906bdf586bd76b14143aa61d6b49e4
        with:
          version: 2.3.10

      - name: Run generation script
        run: kotlin ${{ inputs.script_path }}

      - name: Commit and push to PR branch
        if: inputs.trigger_event_name == 'pull_request'
        run: |
          git add --all
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "${{ inputs.commit_message }}"
            git push
          fi

      - name: Close existing regeneration PRs and prune branches (manual trigger)
        if: inputs.trigger_event_name == 'workflow_dispatch'
        run: |
          gh pr list --base "${{ github.ref_name }}" --state open --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("${{ inputs.branch_prefix }}")) | [.number, .headRefName] | @tsv' \
            | while IFS=$'\t' read -r PR_NUMBER BRANCH; do
                gh pr close "$PR_NUMBER" --comment "Superseded by a new workflow_dispatch run."
              done
          git ls-remote --heads origin "refs/heads/${{ inputs.branch_prefix }}*" \
            | awk '{ sub("refs/heads/","",$2); print $2 }' \
            | while IFS= read -r branch; do git push origin --delete "$branch" || true; done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create new branch and open PR (manual trigger)
        if: inputs.trigger_event_name == 'workflow_dispatch'
        run: |
          git add --all
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            BRANCH="${{ inputs.branch_prefix }}$(date +%Y%m%d%H%M%S)"
            git checkout -b "$BRANCH"
            git commit -m "${{ inputs.commit_message }}"
            git push origin "$BRANCH"
            gh pr create \
              --title "${{ inputs.pr_title }}" \
              --body "Automated PR generated by the **${{ inputs.workflow_name }}** workflow (manual trigger)." \
              --head "$BRANCH" \
              --base "${{ github.ref_name }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
