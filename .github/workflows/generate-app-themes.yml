name: Generate App Themes

on:
  pull_request:
    paths:
      - 'token-source/app_themes.json'
  workflow_dispatch:

jobs:
  generate-themes:
    # Avoid re-triggering when the bot itself pushes changes
    # Manual trigger is restricted to the main branch
    # Fork PRs are excluded as they don't have access to repository secrets
    if: |
      github.actor != 'github-actions[bot]' &&
      (github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main') &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/reusable-generate-tokens.yml
    secrets: inherit
    with:
      script_path: scripts/generateAppThemes.main.kts
      commit_message: 'chore: Regenerate app themes from app_themes.json'
      branch_prefix: bot/regenerate-app-themes-
      pr_title: 'chore: Regenerate app themes from app_themes.json'
      workflow_name: Generate App Themes
      trigger_event_name: ${{ github.event_name }}
      head_ref: ${{ github.head_ref }}
